<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Widi Firmansyah | Portfolio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=optional" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"></noscript>
    <style>
        :root{--bg:#F0F0F0;--primary:#FF5E5B;--secondary:#FFFF00;--accent:#00E5FF;--black:#000;--white:#FFF;--border:4px solid var(--black);--shadow:8px 8px 0 0 var(--black);--shadow-hover:4px 4px 0 0 var(--black)}
        *,body,html{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{background-color:var(--bg);color:var(--black);overflow-x:hidden;cursor:none;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5}
        h1,h2,h3,h4,h5,h6{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:clamp(1rem,2vw+1rem,5rem);line-height:1.1}
        .custom-cursor{width:20px;height:20px;background-color:var(--primary);border:2px solid var(--black);position:fixed;pointer-events:none;z-index:9999;transition:transform .1s ease;mix-blend-mode:difference}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:20px 5%;background:var(--white);border-bottom:var(--border);position:fixed;top:0;left:0;width:100%;height:70px;z-index:1000}
        .nav-logo{font-weight:900;font-size:1.5rem;letter-spacing:-1px}
        .nav-links{display:flex;list-style:none;gap:30px}
        .nav-links a{text-decoration:none;color:var(--black);font-weight:700;text-transform:uppercase;transition:.2s}
        .nav-cta{background:var(--secondary);border:var(--border);padding:10px 20px;font-weight:800;box-shadow:4px 4px 0 0 var(--black);transition:.2s;cursor:none}
        .nav-cta:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 0 var(--black)}
        .nav-actions{display:flex;align-items:center;gap:12px}
        .lang-switcher{position:relative}
        .lang-btn{background:var(--white);border:var(--border);padding:8px 16px;font-weight:800;font-size:.9rem;box-shadow:4px 4px 0 0 var(--black);transition:.2s;cursor:none;font-family:'Space Grotesk',sans-serif;letter-spacing:.5px}
        .lang-btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 0 var(--black);background:var(--accent)}
        .lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:var(--border);box-shadow:6px 6px 0 0 var(--black);z-index:1001;display:none;flex-direction:column;min-width:160px;overflow:hidden}
        .lang-dropdown.active{display:flex;animation:dropdownSlide .2s ease-out}
        @keyframes dropdownSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .lang-dropdown button{background:var(--white);border:none;border-bottom:2px solid var(--black);padding:12px 18px;font-weight:700;font-size:.95rem;text-align:left;cursor:none;transition:.15s;font-family:'Space Grotesk',sans-serif}
        .lang-dropdown button:last-child{border-bottom:none}
        .lang-dropdown button:hover{background:var(--accent)}
        .lang-dropdown button.lang-active{background:var(--secondary);font-weight:900}
        #preloader{transition:opacity .4s ease,visibility .4s ease}
        #preloader.loaded{opacity:0;visibility:hidden}
        .hero{height:100vh;height:100dvh;min-height:-webkit-fill-available;width:100%;position:fixed;top:0;left:0;bottom:0;padding:0;margin:0;z-index:100;overflow:hidden;display:flex;pointer-events:none}
        .curtain-panel{height:100%;width:50%;display:flex;align-items:center;position:relative;pointer-events:all;border:var(--border);will-change:transform}
        .curtain-panel.left{background:var(--accent);padding-left:10%;padding-top:80px;border-right:2px solid var(--black);z-index:2}
        .curtain-panel.right{background:var(--accent);justify-content:center;padding-top:80px;border-left:2px solid var(--black);z-index:1}
        .curtain-content{max-width:600px}
        .hero h1{font-size:5rem;line-height:.9;font-weight:900;margin-bottom:20px;text-transform:uppercase;position:relative;white-space:nowrap}
        .highlight{background:var(--secondary);padding:0 10px;border:var(--border);box-shadow:10px 10px 0 0 var(--black);display:inline-block}
        .hero p{font-size:1.5rem;max-width:600px;margin-bottom:40px;font-weight:500;background:var(--white);padding:10px;border:var(--border);box-shadow:6px 6px 0 0 var(--black)}
        .hero-btns{display:flex;gap:20px}
        .btn{text-decoration:none;padding:15px 30px;font-weight:800;border:var(--border);display:inline-block;box-shadow:var(--shadow);transition:.2s;font-size:1.1rem;color:var(--black)}
        .btn:hover{transform:translate(4px,4px);box-shadow:var(--shadow-hover)}
        .btn-primary{background:var(--primary)}
        .btn-secondary{background:var(--white)}
        .hero-visual{flex:1;display:flex;justify-content:center;align-items:center;position:relative;height:100%}
        .shape{position:absolute;border:var(--border);transition:.1s ease-out;display:flex;justify-content:center;align-items:center;padding:20px;overflow:hidden}
        .shape img{width:60%;height:60%;object-fit:contain;filter:drop-shadow(4px 4px 0 var(--black))}
        .shape-1{width:350px;height:350px;background:var(--primary);transform:rotate(15deg);z-index:1;--rot:15deg;animation:float 6s ease-in-out infinite;top:20%}
        .shape-2{width:280px;height:280px;background:var(--secondary);transform:rotate(-10deg);z-index:3;--rot:-10deg;animation:float 8s ease-in-out infinite reverse;bottom:20%}
        .shape-3{width:220px;height:220px;background:var(--white);transform:rotate(45deg);z-index:2;--rot:45deg;animation:float 10s ease-in-out infinite;right:10%}
        .shape-1 img{width:350px;height:350px;object-fit:cover}
        .shape-2 img,.shape-3 img{transform:rotate(10deg);width:280px;height:280px}
        .shape-3 img{transform:rotate(-45deg)}
        @keyframes float{0%,100%{transform:translateY(0) rotate(var(--rot,15deg))}50%{transform:translateY(-20px) rotate(calc(var(--rot,15deg) + 5deg))}}
        .curtain-info{position:absolute;bottom:50px;font-weight:900;background:var(--white);padding:10px 20px;border:var(--border);animation:bounce 2s infinite}
        @keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}60%{transform:translateY(-5px)}}
        .scroll-progress-container{position:fixed;right:50px;top:50%;transform:translateY(-50%);width:20px;height:300px;background:var(--white);border:var(--border);box-shadow:4px 4px 0 0 var(--black);z-index:1000;display:flex;flex-direction:column;justify-content:flex-start}
        .scroll-progress-bar{width:100%;height:0;background:var(--primary);transition:height .1s linear}
        .reveal{opacity:0;transition:all .8s cubic-bezier(.17,.67,.83,.67)}
        .reveal.active{opacity:1;transform:translate(0) skewX(0) scale(1)!important}
        .hero,.curtain-panel,.navbar,.custom-cursor,.scroll-progress-container{contain:layout}
        .hero-content{min-height:300px}
        .hero h1,.hero p{contain:content}
        @media(max-width:1024px){.hero h1{font-size:3.5rem;white-space:nowrap}.hero p{font-size:1.25rem;margin-bottom:30px}.curtain-panel.left{padding-left:5%}.hamburger{display:flex}.nav-links{display:none;position:absolute;top:100%;left:0;width:100%;background:var(--white);border-bottom:var(--border);box-shadow:0 8px 0 0 var(--black);flex-direction:column;gap:0;padding:0;z-index:999}.nav-links.active{display:flex;animation:menuSlideDown .3s ease-out}@keyframes menuSlideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}.nav-links li{border-bottom:2px solid var(--black)}.nav-links li:last-child{border-bottom:none}.nav-links a{display:block;padding:18px 30px;font-size:1.1rem;transition:.15s}.nav-links a:hover{background:var(--accent);text-decoration:none}}
        @media(max-width:768px){.scroll-progress-container{display:none}.section{padding:60px 8%;border-bottom:4px solid var(--black)}.hero h1{font-size:2.2rem;white-space:nowrap}.hero p{font-size:1rem;margin-bottom:20px;box-shadow:4px 4px 0 0 var(--black)}.hero-btns{flex-direction:column;gap:15px}.btn{padding:10px 20px;font-size:.9rem;width:100%;text-align:center}.hero{flex-direction:column}.curtain-panel.left{width:100%!important;height:70%!important;padding:calc(100px + env(safe-area-inset-top)) 5% 40px;border-right:none;border-bottom:2px solid var(--black);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.curtain-panel.right{width:100%!important;height:30%!important;padding-top:0;border-left:none;border-top:2px solid var(--black);padding-bottom:env(safe-area-inset-bottom);border-inline:none;border-bottom:none}.hero-visual{transform:scale(.5)}.section-title{font-size:2rem}.nav-actions{gap:8px;align-items:stretch}.lang-btn,.nav-cta{height:38px;display:flex;align-items:center;justify-content:center;padding:0 12px;font-size:.8rem;margin:0}.lang-btn{box-shadow:3px 3px 0 0 var(--black)}.nav-cta{padding:0 16px}.hamburger{box-shadow:3px 3px 0 0 var(--black)}.hamburger span{height:2px}.nav-links a{padding:15px 20px;font-size:1rem}.navbar{height:auto;padding:calc(20px + env(safe-area-inset-top)) 5% 20px;align-items:center;background:#fff!important;opacity:1!important}.navbar{z-index:5}.curtain-panel.left,.curtain-panel.right{z-index:10}}
    </style>
    <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="css/style.css"></noscript>
</head>

<body>
    
<div id="preloader">
  <div class="loader"></div>
</div>

    <div id="main-content">
        <div class="custom-cursor"></div>

        <div class="scroll-progress-container">
            <div class="scroll-progress-bar"></div>
        </div>

        <nav class="navbar">
            <div class="nav-logo">WD Portfolio</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="#about" data-i18n="navAbout">About</a></li>
                <li><a href="#projects" data-i18n="navProjects">Projects</a></li>
                <li><a href="#experience" data-i18n="navExperience">Experience</a></li>
                <li><a href="#skills" data-i18n="navSkills">Skills</a></li>
                <li><a href="#contact" data-i18n="navContact">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <div class="lang-switcher">
                    <button class="lang-btn" id="lang-toggle">🌐 EN</button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <button data-lang="en">🇺🇸 English</button>
                        <button data-lang="id">🇮🇩 Indonesia</button>
                        <button data-lang="zh">🇨🇳 中文</button>
                    </div>
                </div>
                <a href="#contact" class="nav-cta" data-i18n="navHireMe">HIRE ME</a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>



        <header class="hero">
            <div class="curtain-panel left">
                <div class="curtain-content" id="hero-content">
                    <!-- Data from JSON -->
                </div>
            </div>
            <div class="curtain-panel right">
                <div class="hero-visual">
                    <div class="shape shape-1">
                        <img src="1690163389614.jpeg" alt="Widi Firmansyah">
                    </div>
                    <div class="shape shape-2">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg"
                            alt="JavaScript">
                    </div>
                    <div class="shape shape-3">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg"
                            alt="React">
                    </div>
                    <div class="curtain-info" data-i18n="scrollToReveal">SCROLL TO REVEAL ↓</div>
                </div>
            </div>
        </header>

        <div class="scroll-trigger"></div>

        <section id="about" class="section about">
            <h2 class="section-title reveal" id="about-title"></h2>
            <div class="about-grid" id="about-grid">
                <!-- Data from JSON -->
            </div>
        </section>

        <div class="projects-scroll-outer" id="projects-scroll-outer">
            <div class="projects-scroll-sticky">
                <section id="projects" class="section projects">
                    <h2 class="section-title reveal" id="projects-title"></h2>
                </section>
                <div class="projects-track-wrapper">
                    <div class="project-grid" id="project-grid">
                        <!-- Data from JSON -->
                    </div>
                </div>
            </div>
        </div>

        <section id="experience" class="section experience">
            <h2 class="section-title reveal" id="experience-title"></h2>
            <div class="experience-timeline" id="experience-timeline">
                <!-- Data from JSON -->
            </div>
        </section>

        <section id="skills" class="section skills">
            <h2 class="section-title reveal" id="skills-title"></h2>
            <div class="skills-container reveal" id="skills-container">
                <!-- Data from JSON -->
            </div>
        </section>

        <section id="contact" class="section contact">
            <div class="contact-box reveal">
                <h2 class="section-title" id="contact-title" data-i18n="contactTitle">LET'S CONNECT</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="contact-name" data-i18n="contactName">NAME</label>
                        <input type="text" id="contact-name" data-i18n-placeholder="contactNamePlaceholder"
                            placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-email" data-i18n="contactEmail">EMAIL</label>
                        <input type="email" id="contact-email" data-i18n-placeholder="contactEmailPlaceholder"
                            placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-message" data-i18n="contactMessage">MESSAGE</label>
                        <textarea id="contact-message" data-i18n-placeholder="contactMessagePlaceholder"
                            placeholder="Tell me about your project..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" data-i18n="contactSend">SEND MESSAGE</button>
                </form>
            </div>
        </section>

        <footer class="footer">
            <p data-i18n="footer">© 2026 DEV.PORTFOLIO - MADE WITH CHAOS & CODE</p>
        </footer>

        <!-- Project Modal -->
        <div id="project-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modal-body">
                    <!-- Data from JS -->
                </div>
            </div>
        </div>

    </div> <!-- End main-content -->

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>

</html>
